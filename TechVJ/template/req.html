
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CinemaniacsHub | Streaming</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding-bottom: 30px;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 12px;
      background: rgba(0, 0, 0, 0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
    }

    .logo-circle {
      position: absolute;
      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      position: relative;
      z-index: 3;
    }

    .video-wrapper {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      background: #0a0a0a;
      position: relative;
    }

    .video-wrapper.active {
      background: linear-gradient(#0a0a0a, #0a0a0a) padding-box,
        linear-gradient(45deg, #00c6ff, #0072ff, #c822ff) border-box;
      border: 2px solid transparent;
      border-bottom: 0;
    }

    .plyr {
      border-radius: 18px;
      width: 100%;
    }

    .file-info-bar {
      
      background: #0a0a0a;
      border-radius: 20px;
      padding: 15px;
      margin: 15px;
     border-bottom: 3px solid #00c6ff;
      border-left: 3px solid #00c6ff;
      border-right: 3px solid #00c6ff;
      position: relative;
      overflow: hidden;
    }

    .label-text,
    .label-size {
      color: #00c6ff;
      font-weight: bold;
    }

    .file-name {
      color: #fff;
      word-break: break-word;
    }

    .btn-custom {
      border-radius: 40px;
      padding: 14px 20px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      border: none;
      color: white;
      flex: 1;
      font-size: 14px;
    }

    .btn-custom:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .btn-mx {
      background: linear-gradient(45deg, #2980b9, #2c3e50);
      color: #fff;
    }

    .btn-vlc {
      background: linear-gradient(45deg, #e67e22, #d35400);
      color: #fff;
    }

    .btn-playit {
      background: linear-gradient(45deg, #ff0000, #ff4d4d, #b30000);
      color: #fff;
    }

    .compat-box {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid #ffc107;
      border-radius: 20px;
      padding: 15px;
      margin: 15px;
      text-align: center;
      color: #ffc107;
    }

    @media (max-width: 768px) {
      .btn-custom {
        padding: 10px 12px;
        font-size: 12px;
      }

      .file-name {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-circle"></div>
      <div class="logo-text">Cinemaniacs Hub</div>
    </div>
  </div>

  <div style="padding: 0 12px;">
    <div class="video-wrapper" id="videoWrapper">
      <video id="player" class="player" playsinline crossorigin poster="https://i.ibb.co/6cgJGJ3p/x.jpg">
        <source src="{{file_url}}">
      </video>
    </div>
  </div>

  <div class="file-info-bar">
    <div>
      <span class="label-text">📁 File Name:</span>
      <span class="file-name" id="displayFileName">{{file_name}}</span><br>
      <span class="label-size">📦 File size:</span>
      <span class="file-name" id="file-size">Detecting...</span>
    </div>
  </div>

  <div style="padding: 0 15px;">
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
      <div class="btn-custom btn-mx" onclick="mx_player()"> MX PLAYER</div>
      <div class="btn-custom btn-vlc" onclick="vlc_player()"> VLC PLAYER</div>
      <div class="btn-custom btn-playit" onclick="playit_player()"> PLAY - IT</div>
    </div>
  </div>

  <div class="compat-box">
    Video Not Playing? Possibly because your browser or player doesn't support the codec. Please watch using external players</div>

  <script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
  <script>
    const playerConfig = {
      controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'download', 'fullscreen'],
      invertTime: false,
      autoplay: false,
      speed: {
        selected: 1,
        options: [0.5, 0.75, 1, 1.25, 1.5, 2]
      },
    };
    const player = new Plyr('#player', playerConfig);
    const video = document.getElementById('player');
    async function detectFileSize() {
      const fileSizeSpan = document.getElementById('file-size');
      const videoUrl = getRawLink();
      try {
        const response = await fetch(videoUrl, {
          method: 'HEAD'
        });
        const contentLength = response.headers.get('content-length');
        if (contentLength) {
          const bytes = parseInt(contentLength);
          const sizes = ['Bytes', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(1024));
          const formattedSize = parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + sizes[i];
          fileSizeSpan.textContent = formattedSize;
        } else {
          fileSizeSpan.innerHTML = 'Unknown (Streaming)';
        }
      } catch (error) {
        fileSizeSpan.innerHTML = 'Not available';
      }
    }
    setTimeout(detectFileSize, 1000);

    function getRawLink() {
      let currentUrl = window.location.href;
      let rawLink = currentUrl.replace("/watch/", "/");
      const templateUrl = "{{file_url}}";
      if (templateUrl && templateUrl !== "{{file_url}}") return templateUrl;
      return rawLink;
    }
    const videoLink = getRawLink();

    function vlc_player() {
      window.location.href = `vlc://${videoLink}`;
    }

    function mx_player() {
      window.location.href = `intent:${videoLink}#Intent;package=com.mxtech.videoplayer.ad;end`;
    }

    function playit_player() {
      window.location.href = `playit://playerv2/video?url=${encodeURIComponent(videoLink)}`;
    }
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
    player.on('enterfullscreen', () => {
      screen.orientation?.lock('landscape');
    });
    const fileNameSpan = document.getElementById('displayFileName');
    if (fileNameSpan && fileNameSpan.innerText.length > 65) {
      fileNameSpan.innerText = fileNameSpan.innerText.slice(0, 62) + '...';
    }
    const wrapper = document.querySelector('.video-wrapper');
    const plyrContainer = document.querySelector('.plyr');
    plyrContainer.addEventListener('click', (e) => {
      e.stopPropagation();
      wrapper.classList.add('active');
    });
    document.addEventListener('click', (e) => {
      if (!wrapper.contains(e.target)) {
        wrapper.classList.remove('active');
      }
    });
    player.on('play', () => {
      wrapper.classList.add('active');
    });
    player.on('pause', () => {
      wrapper.classList.remove('active');
    });
  </script>
</body>

</html>
