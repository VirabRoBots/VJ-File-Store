  <style>
    :root {
      --primary-color: #00f0ff;
      --secondary-color: #7000ff;
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: 1px solid rgba(255, 255, 255, 0.1);
      --card-radius: 16px;
    }

    body {
      background: var(--bg-gradient);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f0c29;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--secondary-color);
      border-radius: 4px;
    }

    /* Header */
    .navbar {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header {
      display: flex;

      gap: 8px;

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
    }

    .logo-circle {

      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
      position: relative;
      z-index: 3;
    }

    /* Player */
    .player-wrapper {
      background: #000;
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-top: 20px;
      border: var(--glass-border);
      transition: all 0.3s ease;
    }

    .player-wrapper.active {
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.35),

      border: 2px solid red;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
    }

    .plyr--video .plyr__control--overlaid,
    .plyr--video .plyr__control:hover {
      background: var(--secondary-color);
    }

    .plyr--full-ui input[type=range] {
      color: var(--primary-color);
    }

    /* Buttons */
    .btn-custom {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .btn-custom:hover {
      transform: translateY(-2px);
      filter: brightness(1.2);
    }

    .btn-mx {
      background: linear-gradient(45deg, #2980b9, #2c3e50);
      color: #fff;
    }

    .btn-vlc {
      background: linear-gradient(45deg, #e67e22, #d35400);
      color: #fff;
    }

    .btn-playit {
      background: linear-gradient(45deg, #8e44ad, #9b59b6);
      color: #fff;
    }

    /* Cards */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: var(--glass-border);
      border-radius: var(--card-radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .file-info-title {
      color: var(--primary-color);
      font-size: 1.1rem;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .info-label {
      color: #888;
    }

    .info-value {
      color: #fff;
      font-family: monospace;
    }

    /* Engagement */
    .engagement-stats .d-flex {
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn-like,
    .btn-dislike,
    .view-badge,
    .btn-subscribe {

      padding: 8px 20px;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-like {
      background: linear-gradient(135deg, #00b09b, #96c93d);
      color: #fff;
    }

    .btn-dislike {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: #fff;
    }

    .view-badge {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
    }

    .btn-subscribe {
      background: linear-gradient(135deg, #0088cc, #2a9d8f);
      color: #fff;
      text-decoration: none;
    }

    .btn-subscribe:hover {
      color: #fff;
    }

    button:focus {
      outline: none;
    }

    /* Animation */
    @keyframes fadeIn {

        opacity: 0;
        transform: translateY(10px);
      }

        opacity: 1;
        transform: translateY(0);
      }
    }

    main {
      animation: fadeIn 0.5s ease-out;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <div class="logo-circle"></div>
        <div class="logo-text">Cinemaniacs Hub</div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="container">

    <!-- Player -->
    <div class="player-wrapper mb-4">
      <video id="myVideo" class="w-100" controls poster="https://i.ibb.co/6cgJGJ3p/x.jpg">
        <source src="{{file_url}}" type="video/mp4">
      </video>
    </div>

    <!-- External Players -->
    <div class="d-flex flex-wrap gap-2 mb-3">
      <a onclick="mx_player()" class="btn btn-custom btn-mx flex-fill">
        <i class="fa fa-play"></i> MX Player
      </a>
      <a onclick="vlc_player()" class="btn btn-custom btn-vlc flex-fill">
        <i class="fa fa-play"></i> VLC Player
      </a>
      <a onclick="playit_player()" class="btn btn-custom btn-playit flex-fill">
        <i class="fa fa-play"></i> PlayIt
      </a>
    </div>

    <!-- File Info -->
    <div class="glass-card">
      <div class="file-info-title">
        <i class="fa-solid fa-circle-info me-2"></i> File Information
      </div>

      <div class="info-item">
        <span class="info-label"><i class="fa-regular fa-file-video"></i> Filename:</span>
        <span class="info-value" id="fileName">{{ file_name }}</span>
      </div>

      <div class="info-item">
        <span class="info-label"><i class="fa-regular fa-hard-drive"></i> File Size:</span>
        <span class="info-value" id="fileSize">{{ file_size }}</span>
      </div>
    </div>

    <!-- Engagement -->
    <div class="engagement-stats mt-3">
      <div class="d-flex gap-3">

        <button class="btn btn-like" onclick="likeVideo()">
          <i class="fa-regular fa-thumbs-up"></i>
          <span id="likeCount">0</span>
        </button>

        <button class="btn btn-dislike" onclick="dislikeVideo()">
          <i class="fa-regular fa-thumbs-down"></i>
          <span id="dislikeCount">0</span>
        </button>

        <div class="view-badge">
          <i class="fa-regular fa-eye"></i>
          <span id="viewCount">0</span> views
        </div>

        <a href="https://t.me/Cinemaniacs_Hub" target="_blank" class="btn-subscribe">
          <i class="fa-brands fa-telegram"></i> Subscribe
        </a>

      </div>
    </div>

  </main>
  <script src="https://cdn.plyr.io/3.6.12/plyr.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const player = new Plyr("#myVideo", {
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
        settings: ['captions', 'quality', 'speed']
      });
      const wrapper = document.querySelector(".player-wrapper");
      wrapper.addEventListener("click", (e) => {
        e.stopPropagation();
        wrapper.classList.add("active");
      });
      document.addEventListener("click", () => {
        wrapper.classList.remove("active");
      });
      player.on('enterfullscreen', () => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      });
      player.on('exitfullscreen', () => {
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      });
      const BIN_ID = "69e63ca736566621a8d25065";
      const API_KEY = "$2a$10$TyOXeu0PPOnyzTfOreJzhOKiw3NyMQtnURo0koS2JFiOFMatKoDgq";
      const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
      const HEADERS = {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      };
      async function loadCounts() {
        const res = await fetch(URL + "/latest", {
          headers: HEADERS
        });
        const data = await res.json();
        const record = data.record;
        document.getElementById("likeCount").innerText = record.likes;
        document.getElementById("dislikeCount").innerText = record.dislikes;
        document.getElementById("viewCount").innerText = record.views;
      }
      async function updateCounts(newData) {
        await fetch(URL, {
          method: "PUT",
          headers: HEADERS,
          body: JSON.stringify(newData)
        });
      }
      window.likeVideo = async function() {
        const res = await fetch(URL + "/latest", {
          headers: HEADERS
        });
        const data = await res.json();
        const record = data.record;
        record.likes += 1;
        document.getElementById("likeCount").innerText = record.likes;
        updateCounts(record);
      };
      window.dislikeVideo = async function() {
        const res = await fetch(URL + "/latest", {
          headers: HEADERS
        });
        const data = await res.json();
        const record = data.record;
        record.dislikes += 1;
        document.getElementById("dislikeCount").innerText = record.dislikes;
        updateCounts(record);
      };
      async function addView() {
        const res = await fetch(URL + "/latest", {
          headers: HEADERS
        });
        const data = await res.json();
        const record = data.record;
        record.views += 1;
        document.getElementById("viewCount").innerText = record.views;
        updateCounts(record);
      }
      loadCounts();
      addView();
    });
    /* external player functions (must be global) */
    function mx_player() {
      let clean = "{{ file_url }}".replace(/^https?:\/\//, '');
      window.location.href = `intent://${clean}#Intent;package=com.mxtech.videoplayer.ad;type=video/*;scheme=https;end`;
    }

    function vlc_player() {
      let clean = "{{ file_url }}".replace(/^https?:\/\//, '');
      window.location.href = `intent://${clean}#Intent;package=org.videolan.vlc;type=video/*;scheme=https;end`;
    }

    function playit_player() {
      let clean = "{{ file_url }}".replace(/^https?:\/\//, '');
      window.location.href = `intent://${clean}#Intent;package=com.playit.videoplayer;type=video/*;scheme=https;end`;
    }

    function streamDownload() {
      window.location.href = "{{ file_url }}";
    }

    function showLinkModal(url) {
      if (url) window.open(url, "_blank");
    }
  </script>
