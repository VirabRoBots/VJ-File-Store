<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Stream | Cinemaniacs Hub</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #000;
      padding-bottom: 30px;
      transition: background 0.3s, color 0.2s;
    }

    /* Dark Mode */
    body.dark-mode {
      background: #0f172a;
      color: #f1f5f9;
    }

    body.dark-mode .header {
      background: #0f172a;
      border-bottom-color: #1e293b;
    }

    body.dark-mode .logo-text {
      color: white;
    }

    body.dark-mode .player-card {
      background: #1e293b;
      color: #cbd5e1;
    }

    body.dark-mode .warning-badge {
      background: #991b1b;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
    }

    .logo-circle {
      position: absolute;
      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: black;
      position: relative;
      z-index: 3;
    }

    #themeToggle {
      background: #f0f0f0;
      border: none;
      font-size: 20px;
      cursor: pointer;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.dark-mode #themeToggle {
      background: #1e293b;
      color: white;
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* File Name */
    .file-name-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 60px;
      padding: 12px 24px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .file-name-card h1 {
      color: white;
      font-size: 1rem;
      font-weight: 600;
      word-break: break-word;
    }

    /* Video Player */
    .video-wrapper {
      background: #000;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    .plyr {
      border-radius: 28px;
    }

    /* External Players Section */
    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 15px 0;
    }

    .section-title h3 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .section-title .line {
      flex: 1;
      height: 3px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border-radius: 3px;
    }

    .players-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .player-card {
      background: #f1f5f9;
      color: #1e293b;
      padding: 12px 20px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
      font-size: 14px;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .player-card:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      box-shadow: 0 10px 20px -5px rgba(0, 114, 255, 0.4);
    }

    .player-card i {
      font-size: 20px;
    }

    /* Download Button */
    .download-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      padding: 14px 28px;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      font-size: 16px;
      border: none;
      width: 100%;
      margin: 10px 0;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
    }

    /* Warning Badge */
    .warning-badge {
      background: #ef4444;
      border-radius: 60px;
      padding: 14px 20px;
      text-align: center;
      margin: 20px 0;
      font-size: 13px;
      color: white;
      font-weight: 500;
    }

    .warning-badge i {
      margin-right: 8px;
    }

    /* Contact Card */
    .contact-card {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 60px;
      padding: 14px 20px;
      text-align: center;
      margin-top: 20px;
    }

    .contact-card a {
      color: white;
      font-weight: bold;
      text-decoration: underline;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      font-size: 12px;
      color: #666;
    }

    body.dark-mode .footer {
      border-top-color: #1e293b;
      color: #94a3b8;
    }

    /* Loading Overlay */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .loader {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
        box-shadow: 0 0 0 0 rgba(0, 114, 255, 0.7);
      }

      70% {
        transform: scale(1.1);
        opacity: 1;
        box-shadow: 0 0 0 15px rgba(0, 114, 255, 0);
      }

      100% {
        transform: scale(0.8);
        opacity: 0.5;
        box-shadow: 0 0 0 0 rgba(0, 114, 255, 0);
      }
    }

    /* Toast */
    .toast-message {
      position: fixed;
      top: 80px;
      right: 20px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      z-index: 10000;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 1.8s forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .container {
        padding: 15px;
      }

      .player-card {
        padding: 8px 16px;
        font-size: 12px;
      }

      .player-card i {
        font-size: 16px;
      }

      .file-name-card h1 {
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo-container">
      <div class="logo-circle"></div>
      <div class="logo-text">Cinemaniacs Hub</div>
    </div>
    <button id="themeToggle">🌙</button>
  </div>

  <div class="container">
    <!-- File Name Display -->
    <div class="file-name-card">
      <h1 id="fileNameDisplay">Loading video information...</h1>
    </div>

    <!-- Video Player -->
    <div class="video-wrapper">
      <video id="player" class="plyr-video" playsinline controls>
        <source src="" type="video/mp4">
      </video>
    </div>

    <!-- External Players Section -->
    <div class="section-title">
      <h3><i class="fas fa-play-circle"></i> Play with External Players</h3>
      <div class="line"></div>
    </div>

    <div class="players-grid">
      <button class="player-card" onclick="openVLC()"><i class="fab fa-vlc"></i> VLC Player</button>
      <button class="player-card" onclick="openMX()"><i class="fas fa-play-circle"></i> MX Player</button>
      <button class="player-card" onclick="openPlayIt()"><i class="fas fa-film"></i> Play-it</button>
      <button class="player-card" onclick="openKM()"><i class="fas fa-video"></i> KM Player</button>
      <button class="player-card" onclick="openSPlayer()"><i class="fas fa-tv"></i> S Player</button>
      <button class="player-card" onclick="openHDPlayer()"><i class="fas fa-hdmi"></i> HD Player (4K)</button>
    </div>

    <!-- Warning Message -->
    <div class="warning-badge">
      <i class="fas fa-exclamation-triangle"></i> Video not playing? Your browser may not support the codec. Please download and watch using an external player.
    </div>
  </div>
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  <script>
    // Get video info from URL
    const urlParams = new URLSearchParams(window.location.search);
    let fileName = urlParams.get('name') || 'Video File';
    let fileUrl = urlParams.get('url') || '';
    // If no URL in params, try to get from path or use default
    if (!fileUrl) {
      const pathParts = window.location.pathname.split('/');
      const lastPart = pathParts[pathParts.length - 1];
      if (lastPart && lastPart.includes('.mp4')) {
        fileUrl = window.location.href;
        fileName = decodeURIComponent(lastPart).replace('.mp4', '').replace(/%20/g, ' ');
      } else {
        // Demo fallback
        fileUrl = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
        fileName = 'Demo Video - For Bigger Blazes';
      }
    }
    // Display file name
    document.getElementById('fileNameDisplay').innerText = fileName;
    // Initialize Plyr player
    let plyrInstance = null;
    const videoElement = document.getElementById('player');
    const sourceElement = videoElement.querySelector('source');
    sourceElement.src = fileUrl;
    videoElement.load();
    document.addEventListener('DOMContentLoaded', () => {
      plyrInstance = new Plyr(videoElement, {
        controls: [
          'play-large', 'rewind', 'play', 'fast-forward',
          'progress', 'current-time', 'duration', 'mute',
          'volume', 'captions', 'settings', 'pip',
          'airplay', 'fullscreen'
        ]
      });
    });
    // Helper function to show toast
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
    // Helper function for loading and redirect
    function showLoadingAndRedirect(link, playerName) {
      if (!link || link === '#') {
        showToast(`${playerName} link not available`);
        return;
      }
      const overlay = document.createElement('div');
      overlay.id = 'loadingOverlay';
      overlay.innerHTML = `
            <div class="loader"></div>
            <p style="color: white; margin-top: 25px; font-size: 18px; font-weight: 600;">Opening ${playerName}...</p>
            <p style="color: #aaa; margin-top: 10px; font-size: 14px;">Redirecting in <span id="countdown" style="color: #00c6ff; font-weight: bold; font-size: 18px;">5</span> seconds</p>
            <button id="cancelLoading" style="margin-top: 30px; padding: 10px 30px; border-radius: 40px; border: none; background: #ff4757; color: white; cursor: pointer; font-weight: bold;">Cancel</button>
        `;
      document.body.appendChild(overlay);
      let seconds = 5;
      let cancelled = false;
      const countdownEl = document.getElementById('countdown');
      const timer = setInterval(() => {
        if (cancelled) return;
        seconds--;
        if (countdownEl) countdownEl.innerText = seconds;
        if (seconds <= 0) {
          clearInterval(timer);
          overlay.remove();
          window.open(link, '_blank');
        }
      }, 1000);
      const cancelBtn = document.getElementById('cancelLoading');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          cancelled = true;
          clearInterval(timer);
          overlay.remove();
          showToast('Redirect cancelled');
        });
      }
    }
    // External player functions (from your friend's page)
    function openVLC() {
      const link = `vlc://${fileUrl}`;
      showLoadingAndRedirect(link, 'VLC Player');
    }

    function openMX() {
      const link = `intent:${fileUrl}#Intent;package=com.mxtech.videoplayer.ad;end`;
      showLoadingAndRedirect(link, 'MX Player');
    }

    function openPlayIt() {
      const link = `playit://playerv2/video?url=${fileUrl}`;
      showLoadingAndRedirect(link, 'Play-it');
    }

    function openKM() {
      const link = `intent:${fileUrl}#Intent;package=com.kmplayer;end`;
      showLoadingAndRedirect(link, 'KM Player');
    }

    function openSPlayer() {
      const link = `intent:${fileUrl}#Intent;action=com.young.simple.player.playback_online;package=com.young.simple.player;end`;
      showLoadingAndRedirect(link, 'S Player');
    }

    function openHDPlayer() {
      const link = `intent:${fileUrl}#Intent;package=uplayer.video.player;end`;
      showLoadingAndRedirect(link, 'HD Player');
    }
    // Download function
    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (fileUrl && fileUrl !== '#') {
        showLoadingAndRedirect(fileUrl, 'Download');
      } else {
        showToast('Download link not available');
      }
    });
    // Disable right click (from your friend's page)
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
    // Theme Toggle (matching your site)
    function initTheme() {
      const btn = document.getElementById('themeToggle');
      const body = document.body;
      if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
        btn.innerHTML = '☀️';
      }
      btn.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
          btn.innerHTML = '☀️';
          localStorage.setItem('theme', 'dark');
        } else {
          btn.innerHTML = '🌙';
          localStorage.setItem('theme', 'light');
        }
      });
    }
    initTheme();
  </script>
</body>

</html>
