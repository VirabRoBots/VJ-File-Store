<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" type="image/x-icon">
  <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" itemprop="thumbnailUrl">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Now Streaming | {{file_name}}</title>
  <!-- Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Delius">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Reset & base clean */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      font-family: 'Raleway', sans-serif;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
      flex-shrink: 0;
    }

    .logo-circle {
      position: absolute;
      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
      left: 2.5px;
      position: relative;
      z-index: 3;
    }

    /* Remove any possible spacing from removed navbar */
    .container-fluid:first-of-type {
      margin-top: 0;
      padding-top: 0;
    }

    /* Video player container responsive */
    .video-wrapper {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      background: #0a0a0a;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8);
    }

    .video-wrapper {
      border: 3px solid transparent;
      border-bottom: 0;
      transition: all 0.3s ease;
    }

    /* Active border effect */
    .video-wrapper.active {
      background: linear-gradient(#0a0a0a, #0a0a0a) padding-box,
        linear-gradient(45deg, #00c6ff, #0072ff, #c822ff) border-box;
    }

    .plyr {
      border-radius: 18px;
      width: 100%;
    }

    /* Custom cards hover effect */
    .player-card {
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .player-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -12px rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 193, 7, 0.6);
      background: #1e1e2f;
    }

    /* for svg icons glow */
    .player-card svg {
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      transition: transform 0.2s;
    }

    .player-card:hover svg {
      transform: scale(1.02);
    }

    .file-info-bar {
      position: relative;
      background: #0a0a0a;
      border-radius: 1.25rem;
      overflow: hidden;
    }

    /* Buttons */
    .btn-custom {
      border-radius: 12px;
      padding: 12px 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      align-text:center;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .btn-custom:hover {
      transform: translateY(-2px);
      filter: brightness(1.2);
    }

    .btn-mx {
      background: linear-gradient(45deg, #2980b9, #2c3e50);
      color: #fff;
    }

    .btn-vlc {
      background: linear-gradient(45deg, #e67e22, #d35400);
      color: #fff;
    }

    .btn-playit {
      background: linear-gradient(45deg, #ff0000, #ff4d4d, #b30000);
      color: #fff;
    }

    /* gradient border like video player */
    .file-info-bar::before {
      content: "";
      position: absolute;
     
      inset: 0;
      padding: 2px;
      border-radius: 1.25rem;
      background: linear-gradient(45deg, #00c6ff, #0072ff, #c822ff);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    /* responsive adjustments */
    @media (max-width: 768px) {

      /* Force single line */
      .plyr__controls {
        flex-wrap: nowrap !important;
        padding: 4px 6px !important;
      }

      .player-card {
        padding: 0.75rem 0.5rem;
      }

      .player-card svg {
        width: 40px;
        height: 40px;
      }
    }

    /* smooth scroll */
    html {
      scroll-behavior: smooth;
    }

    /* disable text selection on buttons */
    .player-card {
      user-select: none;
    }

    .label-text {
      color: #00c6ff;
    }

    .label-size {
      color: #00c6ff;
    }
  </style>
</head>

<body class="bg-black">
  <div class="header">
    <div class="logo-container">
      <div class="logo-circle"></div>
      <div class="logo-text">Cinemaniacs Hub</div>
    </div>
  </div>
  <!-- Online Video Player - Main Plyr element -->
  <div class="container-fluid px-3 py-3">
    <div class="video-wrapper wow animate__animated animate__fadeInUp">
      <video id="player" class="player" playsinline controls crossorigin poster="https://i.ibb.co/6cgJGJ3p/x.jpg">
        <source src="{{file_url}}">
        <p>Your browser doesn't support HTML5 video. Please update your browser.</p>
      </video>
    </div>
  </div>
  <!-- File name & size section -->
  <div class="container-fluid px-3 py-2 mt-1">
    <div class="file-info-bar d-flex justify-content-between align-items-center rounded-4 px-4 py-3 shadow-lg wow animate__animated animate__fadeInDown">
      <div class="d-flex flex-column">
        <span class="fw-bold">
          <span class="label-text">📁 File Name:</span>
          <span id="displayFileName" class="text-white">{{file_name}}</span>
        </span><span class="text-white small opacity-75">
          <span class="label-size fw-bold">📦 File size:</span>
          <span id="file-size" class="text-white">Detecting...</span>
        </span>
      </div>
      <div class="text-secondary-emphasis d-none d-sm-block">
        <i class="bi bi-play-circle-fill text-warning fs-4"></i>
      </div>
    </div>
  </div>

  <!-- Player selection grid: external players section -->
  <div class="container mt-3 mb-2">
    <div class="row justify-content-center align-items-center">
      <div class="col-12 col-lg-10">
        <div class="d-flex flex-wrap justify-content-start align-items-center mb-3 gap-2">
          <p class="text-info fw-semibold mb-0 fs-5">
            | Play with external app
          </p><span class="badge bg-dark text-info ms-2 rounded-pill"><i class="bi bi-lightning-charge"></i> 3 players</span>
        </div>
        <!-- Line 2: 3 buttons -->
        <div class="d-flex gap-2">

          <a onclick="mx_player()" class="btn btn-custom flex-fill btn-mx">
            <i class="fa fa-play"></i> MX Player
          </a>

          <a onclick="vlc_player()" class="btn btn-custom flex-fill btn-vlc">
            <i class="fa fa-play"></i> VLC Player
          </a>

          <a onclick="playit_player()" class="btn btn-custom flex-fill btn-playit">
            <i class="fa fa-play"></i> PlayIt
          </a>

        </div>
      </div>
    </div>
  </div>

  <!-- Compatibility message -->
  <div class="container mt-3">
    <div class="row justify-content-center">
      <div class="col-11 col-md-10 col-lg-8 py-3 text-center bg-warning bg-opacity-10 rounded-4 border border-warning shadow-sm wow animate__animated animate__fadeIn">
        <i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>
        <span class="text-light fw-medium">Video Not Playing? Possibly because your browser or player doesn't support the codec. Please watch using external players.</span>
      </div>
    </div>
  </div>
  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
  <script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    new WOW().init();
    const playerConfig = {
      controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'download', 'fullscreen'],
      invertTime: false,
      autoplay: false,
      speed: {
        selected: 1,
        options: [0.5, 0.75, 1, 1.25, 1.5, 2]
      },
    };
    const player = new Plyr('#player', playerConfig);
    const video = document.getElementById('player');
    async function detectFileSize() {
      const fileSizeSpan = document.getElementById('file-size');
      const videoUrl = getRawLink();
      try {
        // Try to get file size using HEAD request
        const response = await fetch(videoUrl, {
          method: 'HEAD'
        });
        const contentLength = response.headers.get('content-length');
        if (contentLength) {
          const bytes = parseInt(contentLength);
          // Format bytes to human readable
          const sizes = ['Bytes', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(1024));
          const formattedSize = parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + sizes[i];
          fileSizeSpan.textContent = formattedSize;
        } else {
          fileSizeSpan.innerHTML = '📦 File size: Unknown (Streaming)';
        }
      } catch (error) {
        console.log('Cannot detect file size:', error);
        fileSizeSpan.innerHTML = '📦 File size: Not available';
      }
    }
    // Call the function when page loads
    setTimeout(detectFileSize, 1000);

    function getRawLink() {
      let currentUrl = window.location.href;
      let rawLink = currentUrl.replace("/watch/", "/");
      const templateUrl = "{{file_url}}";
      if (templateUrl && templateUrl !== "{{file_url}}") return templateUrl;
      return rawLink;
    }
    const videoLink = getRawLink();

    function vlc_player() {
      window.location.href = `vlc://${videoLink}`;
    }

    function mx_player() {
      window.location.href = `intent:${videoLink}#Intent;package=com.mxtech.videoplayer.ad;end`;
    }

    function playit_player() {
      window.location.href = `playit://playerv2/video?url=${encodeURIComponent(videoLink)}`;
    }
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
    player.on('enterfullscreen', () => {
      screen.orientation?.lock('landscape');
    });
    const fileNameSpan = document.getElementById('displayFileName');
    if (fileNameSpan && fileNameSpan.innerText.length > 65) {
      fileNameSpan.innerText = fileNameSpan.innerText.slice(0, 62) + '...';
    }
    const wrapper = document.querySelector('.video-wrapper');
    const plyrContainer = document.querySelector('.plyr');
    // Activate when clicking inside player
    plyrContainer.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent bubbling to document
      wrapper.classList.add('active');
    });
    // Remove when clicking anywhere outside
    document.addEventListener('click', (e) => {
      if (!wrapper.contains(e.target)) {
        wrapper.classList.remove('active');
      }
    });
    // Keep sync with player state
    player.on('play', () => {
      wrapper.classList.add('active');
    });
    player.on('pause', () => {
      wrapper.classList.remove('active');
    });
  </script>
</body>

</html>
