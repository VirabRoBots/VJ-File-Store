<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>UHD Bots | Premium Stream</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Hkwyv5m9/upscalemedia-transformed.png">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/Hkwyv5m9/upscalemedia-transformed.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.12/plyr.css" />
  <style>
    :root {
      --accent: #00f2ff;
      --secondary: #7000ff;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1)
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #020205;
      color: #fff;
      font-family: Outfit, sans-serif;
      overflow-x: hidden;
      min-height: 100vh
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: .5
    }

    nav {
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border)
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .main-wrapper {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 15px;
      animation: fadeInUp .8s ease-out
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }
      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .video-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
      min-height: 200px
    }

    video {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      background: #000;
      outline: 0
    }

    /* Plyr Customization */
    .plyr--video .plyr__control--overlaid,
    .plyr--video .plyr__control:hover {
      background: var(--secondary);
    }

    .plyr--full-ui input[type=range] {
      color: var(--accent);
    }

    .info-panel {
      padding: 25px
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(45deg, var(--secondary), var(--accent));
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 12px;
      text-transform: uppercase
    }

    .movie-title {
      font-size: 1.6rem;
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: -.5px;
      word-break: break-word
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 25px
    }

    .btn-uhd {
      background: var(--glass);
      border: 1px solid var(--border);
      color: #fff;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      transition: .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer
    }

    .btn-uhd:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
      transform: translateY(-3px)
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border: none
    }

    .btn-primary:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4)
    }

    .bots-intro-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      text-align: center
    }

    .bots-intro-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 700
    }

    .bots-intro-text {
      font-size: .85rem;
      color: #aaa;
      margin-bottom: 15px;
      line-height: 1.5
    }

    .bots-btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .btn-mini {
      background: var(--glass);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      text-decoration: none;
      transition: .3s
    }

    .btn-mini:hover {
      border-color: var(--accent);
      background: rgba(0, 242, 255, 0.1)
    }

    .app-section {
      background: rgba(255, 255, 255, 0.02);
      padding: 15px;
      border-radius: 18px;
      border: 1px solid var(--border)
    }

    .app-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 5px 0
    }

    .app-list::-webkit-scrollbar {
      display: none
    }

    .app-item {
      min-width: 100px;
      background: var(--glass);
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      font-size: 12px;
      border: 1px solid var(--border);
      cursor: pointer
    }

    .app-item:hover {
      border-color: var(--accent)
    }

    .tg-join {
      margin-top: 30px;
      background: linear-gradient(135deg, rgba(36, 161, 222, 0.1), transparent);
      border: 1px solid rgba(36, 161, 222, 0.2);
      border-radius: 20px;
      padding: 30px;
      text-align: center
    }

    .tg-link {
      color: #24A1DE;
      font-weight: 800;
      text-decoration: none;
      font-size: 1.2rem;
      display: block;
      margin-top: 10px
    }

    @media (max-width:600px) {
      .movie-title {
        font-size: 1.3rem
      }
      .action-row {
        grid-template-columns: 1fr 1fr
      }
      .full-mobile {
        grid-column: span 2
      }
      .bots-btn-group {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <nav>
    <div class="logo nav-logo">UHD BOTS</div>
    <a href="https://t.me/UHDBots" style="color:var(--accent);text-decoration:none"><i class="fab fa-telegram"></i></a>
  </nav>
  <div class="main-wrapper">
    <div class="video-card">
      <video id="main-player" src="{{file_url}}" poster="https://i.ibb.co/6cgJGJ3p/x.jpg" preload="metadata"></video>
      <div class="info-panel">
        <div class="status-tag"><i class="fas fa-check-circle"></i> Google Native Engine</div>
        <h1 class="movie-title" id="clean-title">{{file_name}}</h1>
        <div class="action-row">
          <div class="btn-uhd btn-primary full-mobile" onclick="handleAction('dl')"><i class="fas fa-download"></i> Direct Download</div>
          <div class="btn-uhd" onclick="handleAction('cp')"><i class="fas fa-link"></i> Copy</div>
          <div class="btn-uhd" onclick="handleAction('sh')"><i class="fas fa-share-alt"></i> Share</div>
        </div>
        <div class="app-section">
          <p style="font-size:11px;opacity:0.6;margin-bottom:10px">FAST PLAY IN EXTERNAL APPS</p>
          <div class="app-list">
            <div class="app-item" onclick="openExternalPlayer('vlc')"><i class="fas fa-play"></i><br>VLC</div>
            <div class="app-item" onclick="openExternalPlayer('mx')"><i class="fas fa-play"></i><br>MX Player</div>
            <div class="app-item" onclick="openExternalPlayer('playit')"><i class="fas fa-play"></i><br>PlayIt</div>
            <div class="app-item" onclick="openExternalPlayer('km')"><i class="fas fa-play"></i><br>KM Player</div>
          </div>
        </div>
        <div class="bots-intro-card">
          <div class="bots-intro-title"><i class="fas fa-robot"></i> UHD BOTS ECOSYSTEM</div>
          <p class="bots-intro-text">Professional high-speed streaming and file management ecosystem.</p>
          <div class="bots-btn-group">
            <a href="https://t.me/UHDBots" class="btn-mini"><i class="fab fa-telegram-plane"></i> Updates Channel</a>
            <a href="https://bit.ly/4dCws8h" class="btn-mini"><i class="fas fa-globe"></i> Visit Bots Site</a>
          </div>
        </div>
      </div>
    </div>
    <div class="tg-join">
      <p style="opacity:0.7;font-size:14px">Powered By</p>
      <a href="https://t.me/UHDBots" class="tg-link footer-logo">UHD Bots</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.plyr.io/3.6.12/plyr.js"></script>
  <script>
    // Plyr Initialization (Friend's style)
    document.addEventListener("DOMContentLoaded", () => {
      const player = new Plyr("#main-player", {
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
        settings: ['captions', 'quality', 'speed']
      });
    });

    // Helper function to clean URL
    function cleanUrl(url) {
      return url.replace(/^https?:\/\//, '');
    }

    // External Player Functions (Friend's style)
    function openExternalPlayer(playerType) {
      const videoUrl = "{{file_url}}";
      if (!videoUrl || videoUrl.includes('{')) return;
      
      const clean = cleanUrl(videoUrl);
      const fileName = document.getElementById('clean-title')?.innerText || 'Video';
      const encodedTitle = encodeURIComponent(fileName);
      
      let packageName = '';
      switch(playerType) {
        case 'vlc': packageName = 'org.videolan.vlc'; break;
        case 'mx': packageName = 'com.mxtech.videoplayer.ad'; break;
        case 'playit': packageName = 'com.playit.videoplayer'; break;
        case 'km': packageName = 'com.kmplayer'; break;
      }
      
      const intentUrl = `intent://${clean}#Intent;scheme=https;package=${packageName};action=android.intent.action.VIEW;type=video/*;S.title=${encodedTitle};end`;
      const startTime = Date.now();
      window.location.assign(intentUrl);
      
      setTimeout(() => {
        if (Date.now() - startTime < 2000) {
          if (confirm('App not found. Go to Play Store?')) {
            window.location.href = `https://play.google.com/store/apps/details?id=${packageName}`;
          }
        }
      }, 1500);
    }

    // Action Handler (Download, Copy, Share)
    function handleAction(action) {
      const currentUrl = window.location.href;
      
      if (action === 'dl') {
        window.location.href = currentUrl.replace('/watch/', '/dl/');
      } 
      else if (action === 'cp') {
        navigator.clipboard.writeText(currentUrl);
        alert('Link Copied!');
      } 
      else if (action === 'sh') {
        const shareData = {
          title: 'UHD Bots',
          text: 'Stream Movie on UHD Bots!',
          url: currentUrl
        };
        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
          navigator.share(shareData);
        } else {
          navigator.clipboard.writeText(currentUrl);
          alert('Link Copied!');
        }
      }
    }

    // Three.js Background Animation
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    const geometry = new THREE.IcosahedronGeometry(15, 1);
    const material = new THREE.MeshBasicMaterial({ color: 0x7000ff, wireframe: true, transparent: true, opacity: 0.2 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    camera.position.z = 30;
    
    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.y += 0.002;
      mesh.rotation.x += 0.001;
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // Clean title formatting
    const titleElement = document.getElementById('clean-title');
    if (titleElement) {
      titleElement.innerText = titleElement.innerText
        .replace(/[._\-+]/g, ' ')
        .replace(/\[.*?\]/g, '')
        .replace(/\(.*?\)/g, '')
        .trim();
    }
  </script>
</body>

</html>
