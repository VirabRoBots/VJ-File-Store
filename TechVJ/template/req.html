<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{file_name}} - Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .info {
            padding: 20px 0 15px 0;
            color: #fff;
        }
        
        .filename {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 12px;
            word-break: break-word;
            color: #fff;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .btn {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background: #2a2a2a;
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: #0066cc;
        }
        
        .btn-primary:hover {
            background: #0052a3;
        }
        
        .error-msg {
            background: rgba(255,0,0,0.2);
            border: 1px solid rgba(255,0,0,0.5);
            color: #ff9999;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .filename {
                font-size: 1rem;
            }
            .btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <video id="videoPlayer" controls preload="metadata">
                <source src="{{file_url}}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="info">
            <div class="filename">🎬 {{file_name}}</div>
            <div class="controls">
                <button class="btn" onclick="copyLink()">📋 Copy Link</button>
                <a href="{{file_url}}" download class="btn btn-primary">⬇️ Download</a>
                <button class="btn" onclick="openExternal()">📱 Open in External Player</button>
            </div>
        </div>
        
        <div id="errorMsg" class="error-msg">
            ⚠️ Video not playing? Try downloading or opening in external player.
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const errorMsg = document.getElementById('errorMsg');
        
        // Handle video loading errors
        video.addEventListener('error', function(e) {
            errorMsg.style.display = 'block';
            console.error('Video loading error:', e);
        });
        
        // Try to reload if stuck
        let loadAttempts = 0;
        video.addEventListener('loadedmetadata', function() {
            console.log('Video loaded successfully');
            errorMsg.style.display = 'none';
        });
        
        video.addEventListener('stalled', function() {
            if (loadAttempts < 2) {
                loadAttempts++;
                setTimeout(() => {
                    video.load();
                }, 1000);
            }
        });
        
        // Copy link function
        function copyLink() {
            const link = '{{file_url}}';
            navigator.clipboard.writeText(link).then(() => {
                showToast('Link copied to clipboard!');
            }).catch(() => {
                prompt('Copy this link:', link);
            });
        }
        
        // External player function
        function openExternal() {
            const url = '{{file_url}}';
            const fileName = '{{file_name}}';
            
            // Detect Android
            if (/android/i.test(navigator.userAgent)) {
                window.location.href = `intent:${url}#Intent;action=android.intent.action.VIEW;type=video/mp4;end`;
            }
            // Detect iOS
            else if (/iPad|iPhone|iPod/i.test(navigator.userAgent)) {
                window.location.href = `vlc-x-callback://x-callback-url/stream?url=${encodeURIComponent(url)}`;
            }
            // Desktop
            else {
                window.open(url, '_blank');
            }
        }
        
        // Simple toast notification
        function showToast(message) {
            let toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 10px 20px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 9999;
                animation: fadeOut 2s ease forwards;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // Add fade out animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; }
                70% { opacity: 1; }
                100% { opacity: 0; visibility: hidden; }
            }
        `;
        document.head.appendChild(style);
        
        // Log for debugging
        console.log('Video URL:', '{{file_url}}');
        console.log('Video Name:', '{{file_name}}');
    </script>
</body>
</html>
