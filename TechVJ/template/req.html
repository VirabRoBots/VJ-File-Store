<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cinemaniacs - Hub</title>
  <!-- Bootstrap 5 CSS (minimal but used for grid/container) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Plyr core CSS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- GLOBAL RESET & DARK THEME ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0a0f, #030303);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding-bottom: 30px;
      color: #f0f3fa;
    }

    /* custom scrollbar - subtle cyber */
    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-track {
      background: #141414;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #00c6ff;
      border-radius: 10px;
    }

    /* ----- HEADER (CINEMANIACS HUB) ----- */
    .header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 8px;
      background: #0a0a0a;
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
      flex-shrink: 0;
    }

    .logo-circle {
      position: absolute;
      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
      left: 2.5px;
      position: relative;
      z-index: 3;
    }

    /* file info card */
    .file-info {
      background: linear-gradient(105deg, rgba(15, 20, 35, 0.9), rgba(5, 8, 20, 0.85));
      padding: 14px 22px;
      border-radius: 28px;
      margin-bottom: 22px;
      border: 1px solid rgba(0, 198, 255, 0.5);
    }

    .file-info strong {
      color: #00e0ff;
    }

    /* Plyr container styling */
    .plyr {
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px #000, 0 0 0 2px rgba(0, 198, 255, 0.4);
      background: #000;
      transition: 0.2s;
    }

    .plyr:hover {
      box-shadow: 0 28px 45px -14px #000, 0 0 0 2px #00c6ff;
    }

    /* engagement bar */
    .engagement-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 20, 35, 0.9);
      padding: 12px 20px;
      border-radius: 25px;
      margin: 15px 0;
      flex-wrap: wrap;
      gap: 12px;
      border: 1px solid rgba(0, 198, 255, 0.3);
    }

    .stats-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .views-count {
      font-weight: 600;
      font-size: 1rem;
      background: rgba(0, 198, 255, 0.2);
      padding: 6px 15px;
      border-radius: 30px;
    }

    .actions-right {
      display: flex;
      gap: 12px;
    }

    .action-btn,
    .subscribe-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(0, 198, 255, 0.3);
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .like-btn:hover {
      background: rgba(46, 125, 50, 0.3);
      border-color: #2e7d32;
    }

    .dislike-btn:hover {
      background: rgba(198, 40, 40, 0.3);
      border-color: #c62828;
    }

    .subscribe-btn {
      background: linear-gradient(135deg, #ff0000, #cc0000);
      border: none;
    }

    .subscribe-btn:hover {
      transform: translateY(-2px);
    }

    /* external player zone */
    .ext-zone {
      background: rgba(8, 8, 16, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 20px 18px;
      margin-top: 25px;
      border: 1px solid rgba(0, 198, 255, 0.5);
    }

    .ext-zone h5 {
      text-align: center;
      margin-bottom: 16px;
      font-weight: 700;
      background: linear-gradient(130deg, #b5f0ff, #2a9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 1.3rem;
    }

    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .ext-btn {
      background: rgba(15, 20, 32, 0.85);
      border: 1px solid rgba(0, 198, 255, 0.5);
      border-radius: 60px;
      padding: 10px 24px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #f0f4ff;
      cursor: pointer;
      transition: 0.2s;
    }

    .ext-btn:hover {
      background: linear-gradient(135deg, #00c6ff20, #1e5aff40);
      transform: translateY(-2px);
    }

    /* codec alert */
    .codec-alert {
      background: rgba(12, 12, 20, 0.8);
      backdrop-filter: blur(10px);
      color: #ffc107;
      border: 1px solid rgba(0, 198, 255, 0.4);
      border-radius: 20px;
      padding: 12px 20px;
      text-align: center;
      margin-top: 25px;
      font-size: 0.85rem;
    }

    /* responsive plyr controls (no design change, only ensures mobile-friendly visibility) */
    @media (max-width: 600px) {
      .plyr__controls {
        display: flex !important;
        flex-wrap: nowrap !important;
        justify-content: space-between;
        align-items: center;
        gap: 2px;
        padding: 4px;
      }

      .plyr__control {
        flex: 0 0 auto !important;
        padding: 4px !important;
      }

      .plyr__control svg {
        width: 14px !important;
        height: 14px !important;
      }

      .plyr__progress {
        flex: 1 1 auto !important;
        min-width: 40px !important;
        max-width: 70px !important;
      }

      .plyr__time {
        font-size: 10px !important;
      }

      .plyr__volume {
        max-width: 60px !important;
      }

      .engagement-bar {
        flex-direction: column;
        text-align: center;
      }

      .stats-left {
        flex-wrap: wrap;
      }

      .action-btn,
      .subscribe-btn {
        padding: 6px 15px;
        font-size: 0.8rem;
      }
    }

    /* toast message */
    .toast-msg {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: #0f0f1a;
      border-left: 4px solid #00c6ff;
      border-radius: 16px;
      padding: 10px 20px;
      color: white;
      font-size: 13px;
      z-index: 10000;
      transform: translateX(400px);
      transition: 0.3s;
    }

    .toast-msg.show {
      transform: translateX(0);
    }

    @media(max-width:600px) {
      .ext-btn {
        padding: 8px 18px;
        font-size: 0.8rem;
      }

      .file-details {
        display: flex;
        margin-left: -360px;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 8px;
      }

      .file-details> :nth-child(2) {
        margin-left: -20px;
      }

      .engagement-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-circle"></div>
      <div class="logo-text">Cinemaniacs Hub</div>
    </div>
  </div>
  <div class="container mt-3">
    <div style="max-width:900px;margin:0 auto;">
      <!-- placeholder for structure -->
    </div>
    <div class="video-container">
      <video id="player" class="player" playsinline controls poster="https://i.ibb.co/6cgJGJ3p/x.jpg">
        <!-- Fixed: Using a reliable demo video that works across all browsers (standard H.264/AAC) -->
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
      </video>
    </div>

    <!-- Engagement bar with file details + likes/dislikes/views/telegram -->
    <div class="engagement-bar">
      <div class="file-details" style="color: #00e0ff;">
        <div><strong>📁 File:</strong> <span id="fileNameDisplay">Loading...</span></div>
        <div class="mt-1"><strong>💾 Size:</strong> <span id="fileSizeDisplay">—</span></div>
      </div>
      <div class="engagement-row">
        <span class="views-count">
          <i class="fas fa-eye"></i> <span id="viewCount">0</span>
        </span>
        <div class="actions-right">
          <button class="action-btn like-btn" id="likeBtn">
            <i class="fas fa-thumbs-up"></i> <span id="likeCount">0</span>
          </button>
          <button class="action-btn dislike-btn" id="dislikeBtn">
            <i class="fas fa-thumbs-down"></i> <span id="dislikeCount">0</span>
          </button>
          <button class="subscribe-btn" id="subscribeBtn">
            <i class="fab fa-telegram"></i> Join Telegram
          </button>
        </div>
      </div>
    </div>

    <!-- External players zone -->
    <div class="ext-zone">
      <h5><i class="fas fa-external-link-alt me-2"></i> External Players</h5>
      <div class="btn-grid">
        <div onclick="launchPlayer('vlc')" class="ext-btn"><i class="fab fa-vimeo-v"></i> VLC</div>
        <div onclick="launchPlayer('mx')" class="ext-btn"><i class="fas fa-play-circle"></i> MX</div>
        <div onclick="launchPlayer('playit')" class="ext-btn"><i class="fas fa-play"></i> Play-it</div>
        <div onclick="launchPlayer('km')" class="ext-btn"><i class="fas fa-video"></i> KM</div>
        <div onclick="launchPlayer('s')" class="ext-btn"><i class="fas fa-magic"></i> S Player</div>
        <div onclick="launchPlayer('hd')" class="ext-btn"><i class="fas fa-gem"></i> HD Player</div>
      </div>
    </div>

    <!-- codec warning message -->
    <div class="codec-alert">
      ⚠️ Video not playing? Possibly because your browser doesn't support the codec. Please play using external Player.
    </div>
  </div>

  <div id="toastMsg" class="toast-msg">
    <i class="fas fa-check-circle" style="color:#00c6ff;margin-right:8px;"></i>
    <span id="toastText">Launching...</span>
  </div>

  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
  <script>
    (function() {
      // ========== JSONBin.io CONFIG (persistent stats) ==========
      const BIN_ID = "69e4b76b36566621a8cc408f"; // your bin ID
      const API_KEY = "$2a$10$TyOXeu0PPOnyzTfOreJzhOKiw3NyMQtnURo0koS2JFiOFMatKoDgq"; // master key
      
      // Get current video source from the <source> tag (fixed demo URL)
      const videoSourceElem = document.querySelector('#player source');
      let currentSourceUrl = '';
      if (videoSourceElem && videoSourceElem.src) {
        currentSourceUrl = videoSourceElem.src;
      } else {
        const vid = document.getElementById('player');
        if (vid && vid.src) currentSourceUrl = vid.src;
        else currentSourceUrl = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
      }
      
      // Generate stable videoId based on source URL (to keep stats per video)
      let videoId = "default_video";
      if (currentSourceUrl) {
        // create a consistent ID from URL
        let urlHash = 0;
        for (let i = 0; i < currentSourceUrl.length; i++) {
          urlHash = ((urlHash << 5) - urlHash) + currentSourceUrl.charCodeAt(i);
          urlHash |= 0;
        }
        videoId = "vid_" + Math.abs(urlHash).toString(16);
      } else {
        videoId = "demo_video_main";
      }
      
      // stats structure
      let currentStats = { views: 0, likes: 0, dislikes: 0 };
      let userLiked = false;
      let userDisliked = false;
      let viewRecorded = false;
      
      // DOM elements
      const viewSpan = document.getElementById('viewCount');
      const likeSpan = document.getElementById('likeCount');
      const dislikeSpan = document.getElementById('dislikeCount');
      const fileNameSpan = document.getElementById('fileNameDisplay');
      const fileSizeSpan = document.getElementById('fileSizeDisplay');
      const likeBtn = document.getElementById('likeBtn');
      const dislikeBtn = document.getElementById('dislikeBtn');
      const subscribeBtn = document.getElementById('subscribeBtn');
      
      // Helper: update UI from currentStats
      function updateDisplay() {
        if (viewSpan) viewSpan.innerText = currentStats.views.toLocaleString();
        if (likeSpan) likeSpan.innerText = currentStats.likes;
        if (dislikeSpan) dislikeSpan.innerText = currentStats.dislikes;
      }
      
      // Fetch stats from JSONBin
      async function getStats() {
        try {
          const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { 'X-Master-Key': API_KEY }
          });
          if (!response.ok) throw new Error('Network response error');
          const data = await response.json();
          const record = data.record;
          if (record && record.videos && record.videos[videoId]) {
            currentStats = { ...record.videos[videoId] };
          } else {
            currentStats = { views: 0, likes: 0, dislikes: 0 };
            await updateStatsOnCloud();
          }
          updateDisplay();
        } catch (err) {
          console.warn("JSONBin fetch fallback, using local stats", err);
          // Try to load from localStorage as fallback
          const localStats = localStorage.getItem(`cinemaniacs_${videoId}`);
          if (localStats) {
            currentStats = JSON.parse(localStats);
          } else {
            currentStats = { views: 0, likes: 0, dislikes: 0 };
          }
          updateDisplay();
        }
      }
      
      // Push currentStats to JSONBin with fallback to localStorage
      async function updateStatsOnCloud() {
        // Save to localStorage as backup
        localStorage.setItem(`cinemaniacs_${videoId}`, JSON.stringify(currentStats));
        try {
          // Fetch current bin to preserve other videos structure
          const getResp = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { 'X-Master-Key': API_KEY }
          });
          const data = await getResp.json();
          let allVideos = (data.record && data.record.videos) ? data.record.videos : {};
          allVideos[videoId] = { ...currentStats };
          const putResp = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': API_KEY
            },
            body: JSON.stringify({ videos: allVideos })
          });
          if (!putResp.ok) throw new Error('put failed');
        } catch (e) {
          console.error("Failed to sync stats to cloud, using localStorage only", e);
        }
      }
      
      // Add view (once per session per video)
      async function addView() {
        if (!viewRecorded && currentSourceUrl) {
          viewRecorded = true;
          currentStats.views += 1;
          updateDisplay();
          await updateStatsOnCloud();
        }
      }
      
      // Like handler
      async function addLike() {
        if (userLiked) {
          showToast("Already liked this video");
          return;
        }
        if (userDisliked) {
          // remove previous dislike
          currentStats.dislikes = Math.max(0, currentStats.dislikes - 1);
          userDisliked = false;
        }
        currentStats.likes += 1;
        userLiked = true;
        updateDisplay();
        await updateStatsOnCloud();
        showToast('Thanks for liking! ❤️');
      }
      
      // Dislike handler
      async function addDislike() {
        if (userDisliked) {
          showToast("Already disliked");
          return;
        }
        if (userLiked) {
          currentStats.likes = Math.max(0, currentStats.likes - 1);
          userLiked = false;
        }
        currentStats.dislikes += 1;
        userDisliked = true;
        updateDisplay();
        await updateStatsOnCloud();
        showToast('Feedback recorded');
      }
      
      // Update file name and size from video source
      function updateFileMetadata() {
        if (!currentSourceUrl) {
          fileNameSpan.innerText = "sample_movie.mp4";
          fileSizeSpan.innerText = "~ 245 MB";
          return;
        }
        try {
          let rawName = decodeURIComponent(currentSourceUrl.split('/').pop().split('?')[0] || 'video');
          rawName = rawName.replace(/\+/g, ' ').replace(/@[^\s]+/g, '').replace(/@/g, '').replace(/\s+/g, ' ').trim();
          if (rawName.length > 65) rawName = rawName.slice(0, 62) + '...';
          fileNameSpan.innerText = rawName || "media_file.mp4";
          
          // Get file size via HEAD request with timeout fallback
          fetch(currentSourceUrl, { method: 'HEAD', mode: 'cors', cache: 'no-cache' })
            .then(res => {
              const len = res.headers.get('content-length');
              if (len) {
                const bytes = parseInt(len, 10);
                let sizeText = '';
                if (bytes < 1e6) sizeText = (bytes / 1024).toFixed(1) + ' KB';
                else if (bytes < 1e9) sizeText = (bytes / 1048576).toFixed(2) + ' MB';
                else sizeText = (bytes / 1073741824).toFixed(2) + ' GB';
                fileSizeSpan.innerText = sizeText;
              } else {
                fileSizeSpan.innerText = '~ 180 MB';
              }
            })
            .catch(() => {
              fileSizeSpan.innerText = '~ 180 MB';
            });
        } catch (e) {
          fileNameSpan.innerText = "video_stream";
          fileSizeSpan.innerText = "—";
        }
      }
      
      // Toast notification system
      function showToast(msg) {
        const toastDiv = document.getElementById('toastMsg');
        const toastTextSpan = document.getElementById('toastText');
        if (toastTextSpan) toastTextSpan.innerText = msg;
        if (toastDiv) {
          toastDiv.classList.add('show');
          setTimeout(() => {
            toastDiv.classList.remove('show');
          }, 2200);
        }
      }
      
      // External player launcher (improved with proper intent/url schemes)
      window.launchPlayer = function(playerType) {
        let targetUrl = currentSourceUrl;
        if (!targetUrl || targetUrl === "") {
          targetUrl = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";
        }
        showToast(`⟳ Opening ${playerType.toUpperCase()} Player...`);
        
        let intentUri = "";
        switch(playerType) {
          case 'vlc':
            intentUri = `vlc://${targetUrl}`;
            break;
          case 'mx':
            intentUri = `intent:${targetUrl}#Intent;package=com.mxtech.videoplayer.ad;scheme=https;end`;
            break;
          case 'playit':
            intentUri = `playit://playerv2/video?url=${encodeURIComponent(targetUrl)}`;
            break;
          case 'km':
            intentUri = `intent:${targetUrl}#Intent;package=com.kmplayer;scheme=https;end`;
            break;
          case 's':
            intentUri = `intent:${targetUrl}#Intent;action=com.young.simple.player.playback_online;package=com.young.simple.player;scheme=https;end`;
            break;
          case 'hd':
            intentUri = `intent:${targetUrl}#Intent;package=uplayer.video.player;scheme=https;end`;
            break;
          default:
            intentUri = `vlc://${targetUrl}`;
        }
        
        // Attempt to open the intent; if fails, show helpful message
        setTimeout(() => {
          try {
            window.location.href = intentUri;
          } catch(e) {
            showToast("Player not installed or link not supported");
          }
        }, 50);
      };
      
      // Initialize Plyr instance with full controls
      const playerElem = document.getElementById('player');
      let plyrInstance = null;
      if (playerElem) {
        plyrInstance = new Plyr(playerElem, {
          controls: [
            'play-large', 'rewind', 'play', 'fast-forward',
            'progress', 'current-time', 'duration', 'mute',
            'volume', 'captions', 'settings', 'pip', 'airplay', 'download', 'fullscreen'
          ],
          settings: ['captions', 'quality', 'speed'],
          invertTime: false,
          toggleInvert: false
        });
        
        // Record view on first play event
        let viewEventFired = false;
        plyrInstance.on('play', () => {
          if (!viewEventFired) {
            viewEventFired = true;
            addView();
          }
        });
      } else {
        // Fallback vanilla event listener
        if (playerElem) {
          let viewEventFired = false;
          playerElem.addEventListener('play', () => {
            if (!viewEventFired) {
              viewEventFired = true;
              addView();
            }
          });
        }
      }
      
      // Attach like/dislike button events
      if (likeBtn) likeBtn.onclick = addLike;
      if (dislikeBtn) dislikeBtn.onclick = addDislike;
      if (subscribeBtn) {
        subscribeBtn.onclick = () => {
          window.open('https://t.me/Cinemaniacs_Hub', '_blank');
          showToast('Opening Telegram Channel');
        };
      }
      
      // Disable right-click on page (as original)
      document.addEventListener('contextmenu', e => e.preventDefault());
      
      // Also disable drag on video to keep consistent
      if (playerElem) {
        playerElem.addEventListener('dragstart', (e) => e.preventDefault());
      }
      
      // Load stats and file metadata
      getStats();
      updateFileMetadata();
      
      // For demo, ensure that if the video never plays, we still show proper UI
      // Provide a manual view increment for non-playing? No, only on play.
      console.log("Cinemaniacs Hub fully loaded with video:", currentSourceUrl);
    })();
  </script>
</body>

</html>
