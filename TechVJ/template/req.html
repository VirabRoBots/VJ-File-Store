<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cinemaniacs Hub | Stream Player</title>
  <!-- Bootstrap 5 + Icons + Plyr + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', 'Raleway', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f1f5f9;
      padding-bottom: 40px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #000;
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
      flex-shrink: 0;
    }

    .logo-circle {
      position: absolute;
      right: 215px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
      left: 2.5px;
      position: relative;
      z-index: 3;
    }

    .thumbnail-banner img {
      width: 100%;
      height: auto;
      max-height: 300px;
      object-fit: cover;
      display: block;
    }

    .file-info-container {
      width: 100%;
      padding: 12px 10px;
      border-radius: 0;
    }

    .thumbnail-banner {
      width: 100%;
      border-radius: 0;
    }

    /* file info panel + video wrapper same width */
    .file-info-container {
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 198, 255, 0.3);
      border-radius: 24px;
      padding: 12px 5px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      width: 92%;
      max-width: 1200px;
      margin: 20px auto;
    }

    .info-badge {
      flex: 0 0 auto;
      /* stop stretching */
      width: auto;
    }

    .file-info-container {
      justify-content: center;
      /* center badges */
      gap: 10px;
    }

    .filename-value {
      max-width: 100%;
      display: inline-block;
    }

    /* Engagement buttons container - added to match original style */
    .engagement-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .engagement-btn {
      background: rgba(0, 114, 255, 0.2);
      border: 1px solid rgba(0, 198, 255, 0.3);
      border-radius: 40px;
      padding: 6px 16px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #f1f5f9;
    }

    .engagement-btn:hover {
      transform: translateY(-2px);
      background: rgba(0, 114, 255, 0.4);
      border-color: #00c6ff;
    }

    .engagement-btn.liked {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      border-color: #60a5fa;
    }

    .engagement-btn.disliked {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      border-color: #f87171;
    }

    .subscribe-btn {
      background: linear-gradient(135deg, #e11d48, #be123c);
      border: none;
    }

    .subscribe-btn.subscribed {
      background: linear-gradient(135deg, #10b981, #047857);
    }

    .view-badge {
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 768px) {
      .filename-value {
        max-width: 180px;
      }

      .info-badge {
        flex-wrap: wrap;
      }

      .info-badge span:last-child {
        white-space: normal;
        word-break: break-all;
      }

      .file-info-container {
        flex-direction: column;
      }

      .engagement-buttons {
        justify-content: flex-start;
        margin-top: 8px;
      }

      /* external player buttons - clean style */
      .external-player-btn {
        background: linear-gradient(135deg, #1e1e2f, #2a2a3c);
        border: 1px solid rgba(0, 198, 255, 0.3);
        padding: 10px 20px;
        border-radius: 50px;
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
        backdrop-filter: blur(4px);
      }

      .external-player-btn:hover {
        transform: translateY(-3px);
        background: linear-gradient(135deg, #2a2a3c, #3a3a4f);
        border-color: #00c6ff;
        box-shadow: 0 8px 20px rgba(0, 198, 255, 0.2);
      }

      .external-player-btn:active {
        transform: translateY(0);
      }

      .warning-banner {
        background: linear-gradient(95deg, #dc2626, #b91c1c);
        border-radius: 25px;
        padding: 10px 18px;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.3px;
        width: 92%;
        max-width: 1200px;
        margin: 20px auto;
        text-align: center;
      }

      .video-wrapper {
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        overflow: hidden;
      }

      .video-wrapper {
        position: relative;
      }

      /* Default hidden */
      .video-wrapper::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 16px;
        pointer-events: none;
        z-index: 999;
        /* VERY IMPORTANT */
      }

      .video-wrapper,
      video {
        border-radius: 16px;
        overflow: hidden;
      }

      /* Active border */
      .video-wrapper.active::after {
        border-top: 3px solid #00c6ff;
        border-left: 3px solid #00c6ff;
        border-right: 3px solid #00c6ff;
      }
    }
  </style>
</head>

  <script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
  <script>
    const videoWrapper = document.querySelector('.video-wrapper');
    const video = document.getElementById('plyrVideo');
    // Click anywhere inside player
    videoWrapper.addEventListener('click', (e) => {
      e.stopPropagation();
      videoWrapper.classList.add('active');
    });
    // Also detect click directly on video
    video.addEventListener('click', (e) => {
      e.stopPropagation();
      videoWrapper.classList.add('active');
    });
    // Click outside → remove
    document.addEventListener('click', () => {
      videoWrapper.classList.remove('active');
    });
    new WOW().init();
    // ---------- JSONBIN.IO CONFIGURATION ----------
    // IMPORTANT: Replace with your actual JSONbin Bin ID and API Key
    const JSONBIN_BIN_ID = '69e4b76b36566621a8cc408f'; // <-- REPLACE WITH YOUR BIN ID
    const JSONBIN_API_KEY = '$2a$10$TyOXeu0PPOnyzTfOreJzhOKiw3NyMQtnURo0koS2JFiOFMatKoDgq'; // <-- REPLACE WITH YOUR API KEY (X-Master-Key)
    const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    // ---------- AUTO DETECT VIDEO FROM CURRENT PAGE URL ----------
    const currentUrl = window.location.href;
    const currentPath = window.location.pathname;
    const urlParts = currentPath.split('/');
    let detectedFileName = '';
    let detectedVideoUrl = '';
    if (currentPath.includes('/watch/')) {
      let filenamePart = urlParts[urlParts.length - 1];
      filenamePart = filenamePart.replace(/\+/g, ' ');
      filenamePart = decodeURIComponent(filenamePart);
      detectedFileName = filenamePart;
      detectedVideoUrl = currentUrl;
    }
    const urlParams = new URLSearchParams(window.location.search);
    const paramFileName = urlParams.get('title');
    const fileSizeFromServer = '{{file_size}}';
    const paramVideoUrl = urlParams.get('url');
    let fileName = paramFileName || detectedFileName || 'Unknown title';
    fileName = fileName.replace(/\+/g, ' ');
    let videoUrl = paramVideoUrl || detectedVideoUrl || '';
    let fileSize = fileSizeFromServer;
    if (!fileSize || fileSize === '{{file_size}}') {
      fetchFileSize(videoUrl).then(size => {
        document.getElementById('fileSizeDisplay').innerText = size;
      });
    } else {
      document.getElementById('fileSizeDisplay').innerText = fileSize;
    }
    const videoSource = document.getElementById('videoSource');
    const videoElement = document.getElementById('plyrVideo');
    if (videoUrl) {
      videoSource.src = videoUrl;
      videoElement.load();
    }
    const playerInstance = Plyr.setup('#plyrVideo', {
      controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'download', 'fullscreen'],
      download: true
    });

    function getCurrentVideoUrl() {
      return videoSource.src || '';
    }
    window.triggerExternalPlayer = function(type) {
      const videoUrlRaw = getCurrentVideoUrl();
      if (!videoUrlRaw) return;
      let intentUrl = '';
      switch (type) {
        case 'vlc':
          intentUrl = `vlc://${videoUrlRaw}`;
          break;
        case 'mx':
          intentUrl = `intent:${videoUrlRaw}#Intent;package=com.mxtech.videoplayer.ad;end`;
          break;
        case 'playit':
          intentUrl = `playit://playerv2/video?url=${encodeURIComponent(videoUrlRaw)}`;
          break;
        case 'km':
          intentUrl = `intent:${videoUrlRaw}#Intent;package=com.kmplayer;end`;
          break;
        case 'splayer':
          intentUrl = `intent:${videoUrlRaw}#Intent;action=com.young.simple.player.playback_online;package=com.young.simple.player;end`;
          break;
        case 'hd':
          intentUrl = `intent:${videoUrlRaw}#Intent;package=uplayer.video.player;end`;
          break;
        default:
          intentUrl = videoUrlRaw;
      }
      window.location.href = intentUrl;
    };
    // ---------- ENGAGEMENT FEATURE (Like, Dislike, View, Subscribe) with JSONbin ----------
    const videoUniqueId = btoa(encodeURIComponent(fileName + fileSize)).substring(0, 32).replace(/[^a-zA-Z0-9]/g, '');
    let currentLikes = 0,
      currentDislikes = 0,
      currentViews = 0;
    let userLiked = false,
      userDisliked = false;
    const likeBtn = document.getElementById('likeBtn');
    const dislikeBtn = document.getElementById('dislikeBtn');
    const subscribeBtn = document.getElementById('subscribeBtn');
    const likeSpan = document.getElementById('likeCount');
    const dislikeSpan = document.getElementById('dislikeCount');
    const viewSpan = document.getElementById('viewCount');
    const subscribeSpan = document.getElementById('subscribeText');
    async function fetchEngagementData() {
      if (JSONBIN_BIN_ID === 'YOUR_JSONBIN_BIN_ID') {
        loadFromLocalStorage();
        return;
      }
      try {
        const response = await fetch(BIN_URL, {
          headers: {
            'X-Master-Key': JSONBIN_API_KEY
          }
        });
        if (!response.ok) throw new Error('Failed to fetch');
        const data = await response.json();
        const record = data.record || {};
        const videoData = record[videoUniqueId] || {};
        currentLikes = videoData.likes || 0;
        currentDislikes = videoData.dislikes || 0;
        currentViews = videoData.views || 0;
        userLiked = videoData.userLiked || false;
        userDisliked = videoData.userDisliked || false;
        updateUI();
        if (!sessionStorage.getItem(`view_incremented_${videoUniqueId}`)) {
          await incrementViewCount();
          sessionStorage.setItem(`view_incremented_${videoUniqueId}`, 'true');
        }
      } catch (err) {
        console.error('JSONbin error:', err);
        loadFromLocalStorage();
      }
    }
    async function saveToJsonbin() {
      if (JSONBIN_BIN_ID === 'YOUR_JSONBIN_BIN_ID') {
        saveToLocalStorage();
        return;
      }
      try {
        const getResp = await fetch(BIN_URL, {
          headers: {
            'X-Master-Key': JSONBIN_API_KEY
          }
        });
        const fullData = await getResp.json();
        let record = fullData.record || {};
        record[videoUniqueId] = {
          likes: currentLikes,
          dislikes: currentDislikes,
          views: currentViews,
          userLiked: userLiked,
          userDisliked: userDisliked,
          updatedAt: Date.now()
        };
        await fetch(BIN_URL, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_API_KEY
          },
          body: JSON.stringify(record)
        });
      } catch (err) {
        console.error('Save failed:', err);
        saveToLocalStorage();
      }
    }

    function loadFromLocalStorage() {
      const stored = localStorage.getItem(`engagement_${videoUniqueId}`);
      if (stored) {
        const data = JSON.parse(stored);
        currentLikes = data.likes || 0;
        currentDislikes = data.dislikes || 0;
        currentViews = data.views || 0;
        userLiked = data.userLiked || false;
        userDisliked = data.userDisliked || false;
      }
      updateUI();
      if (!sessionStorage.getItem(`view_inc_local_${videoUniqueId}`)) {
        incrementViewCount();
        sessionStorage.setItem(`view_inc_local_${videoUniqueId}`, 'true');
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem(`engagement_${videoUniqueId}`, JSON.stringify({
        likes: currentLikes,
        dislikes: currentDislikes,
        views: currentViews,
        userLiked: userLiked,
        userDisliked: userDisliked
      }));
    }
    async function incrementViewCount() {
      currentViews++;
      updateUI();
      if (JSONBIN_BIN_ID !== 'YOUR_JSONBIN_BIN_ID') await saveToJsonbin();
      else saveToLocalStorage();
    }

    function updateUI() {
      likeSpan.innerText = currentLikes;
      dislikeSpan.innerText = currentDislikes;
      viewSpan.innerText = currentViews;
      if (userLiked) likeBtn.classList.add('liked');
      else likeBtn.classList.remove('liked');
      if (userDisliked) dislikeBtn.classList.add('disliked');
      else dislikeBtn.classList.remove('disliked');
      // Keep Subscribe button text always as "Subscribe"
      subscribeSpan.innerText = 'Subscribe';
      subscribeBtn.classList.remove('subscribed');
    }
    async function handleLike() {
      if (userLiked) {
        currentLikes--;
        userLiked = false;
      } else {
        if (userDisliked) {
          currentDislikes--;
          userDisliked = false;
          dislikeBtn.classList.remove('disliked');
        }
        currentLikes++;
        userLiked = true;
      }
      updateUI();
      if (JSONBIN_BIN_ID !== 'YOUR_JSONBIN_BIN_ID') await saveToJsonbin();
      else saveToLocalStorage();
    }
    async function handleDislike() {
      if (userDisliked) {
        currentDislikes--;
        userDisliked = false;
      } else {
        if (userLiked) {
          currentLikes--;
          userLiked = false;
          likeBtn.classList.remove('liked');
        }
        currentDislikes++;
        userDisliked = true;
      }
      updateUI();
      if (JSONBIN_BIN_ID !== 'YOUR_JSONBIN_BIN_ID') await saveToJsonbin();
      else saveToLocalStorage();
    }

    function handleSubscribe() {
      window.open('https://t.me/Cinemaniacs_hub', '_blank');
    }
    likeBtn.addEventListener('click', handleLike);
    dislikeBtn.addEventListener('click', handleDislike);
    subscribeBtn.addEventListener('click', handleSubscribe);
    fetchEngagementData();
    // Disable context menu & devtools
    document.addEventListener("contextmenu", (e) => e.preventDefault());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
    async function fetchFileSize(url) {
      try {
        const response = await fetch(url, {
          method: 'HEAD'
        });
        const size = response.headers.get('content-length');
        if (size) {
          const mb = (size / (1024 * 1024)).toFixed(2);
          return mb + ' MB';
        }
      } catch (err) {
        console.error('Size fetch failed:', err);
      }
      return 'Unknown size';
    }
  </script>
</body>

</html>
