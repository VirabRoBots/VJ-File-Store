<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Now Streaming | {{file_name}}</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding-bottom: 30px;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 12px;
      background: rgba(0, 0, 0, 0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .plyr__controls__item {
      ga: 1 margin-right: -11px;
    }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      height: 50px;
    }

    .logo-circle {
      position: absolute;
      right: -25px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      position: relative;
      z-index: 3;
    }

    .video-wrapper {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      background: #0a0a0a;
      position: relative;
    }

    .video-wrapper.active {
      background: linear-gradient(#0a0a0a, #0a0a0a) padding-box,
        linear-gradient(45deg, #00c6ff, #0072ff, #c822ff) border-box;
      border: 2px solid transparent;
      border-bottom: 0;
    }

    .plyr {
      border-radius: 18px;
      width: 100%;
    }

    /* Glassmorphic card */
    .glass-card {
      background: rgba(12, 16, 26, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(96, 165, 250, 0.25);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      margin: 20px auto;
      max-width: 1280px;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .file-info-title {
      color: #60a5fa;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(96, 165, 250, 0.3);
      padding-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .info-item {
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .info-label {
      color: #9ca3af;
      font-weight: 500;
    }

    .info-value {
      color: #f0f3fa;
      font-family: 'Outfit', monospace;
      font-weight: 500;
      word-break: break-word;
    }

    /* Engagement row */
    .engagement-stats .d-flex {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin: 20px 0 10px;
    }

    .btn-like,
    .btn-dislike,
    .view-badge,
    .btn-subscribe {
      border-radius: 60px;
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .btn-like {
      background: linear-gradient(115deg, #059669, #10b981);
      color: white;
    }

    .btn-like:hover {
      transform: scale(1.03);
      filter: brightness(1.05);
    }

    .btn-dislike {
      background: linear-gradient(115deg, #be123c, #e11d48);
      color: white;
    }

    .btn-dislike:hover {
      transform: scale(1.03);
    }

    .view-badge {
      background: linear-gradient(125deg, #1e3a8a, #3b82f6);
      color: white;
      font-weight: 600;
    }

    .btn-subscribe {
      background: linear-gradient(135deg, #0f7b6e, #2a9d8f);
      text-decoration: none;
      color: white;
    }

    .btn-subscribe:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #1e8f7e, #38b2a5);
    }

    /* External players row */
    .players-row {
      display: flex;
      gap: 14px;
      margin: 25px 0 20px;
      flex-wrap: wrap;
    }

    .btn-custom {
      border-radius: 50px;
      padding: 14px 10px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
      color: white;
      flex: 1;
      font-size: 1rem;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(20, 25, 40, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-custom:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
      box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.4);
    }

    .btn-mx {
      background: linear-gradient(115deg, #1e3a5f, #0f4c5c);
      border-left: 3px solid #3b82f6;
    }

    .btn-vlc {
      background: linear-gradient(115deg, #e67e22, #b45309);
      border-left: 3px solid #f97316;
    }

    .btn-playit {
      background: linear-gradient(115deg, #b91c1c, #7f1d1d);
      border-left: 3px solid #ef4444;
    }

    /* compatibility alert */
    .compat-box {
      background: rgba(251, 191, 36, 0.12);
      border-left: 4px solid #fbbf24;
      border-radius: 24px;
      padding: 14px 20px;
      margin: 18px 0 6px;
      text-align: center;
      color: #ffdf8c;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .file-name-truncate {
      max-width: 100%;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .header {
        padding: 10px 16px;
      }

      .logo-text {
        font-size: 1.3rem;
      }

      .logo-circle {
        width: 36px;
        height: 36px;
      }

      .glass-card {
        padding: 1.2rem;
        margin: 12px;
        border-radius: 24px;
      }

      .btn-custom {
        padding: 12px 8px;
        font-size: 0.8rem;
      }

      .btn-like,
      .btn-dislike,
      .view-badge,
      .btn-subscribe {
        padding: 7px 18px;
        font-size: 0.8rem;
      }
    }

    @media (max-width: 768px) {
      .plyr__controls {
        flex-wrap: nowrap !important;
        justify-content: space-between !important;
        gap: 2px !important;
        padding: 8px 5px !important;
      }

      .plyr__control {
        padding: 6px 4px !important;
        min-width: auto !important;
      }

      .plyr__time {
        font-size: 10px !important;
        padding: 0 4px !important;
      }

      .plyr__progress {
        min-width: 60px !important;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-circle"></div>
      <div class="logo-text">Cinemaniacs Hub</div>
    </div>
  </div>

  <div style="padding: 0 12px;">
    <div class="video-wrapper" id="videoWrapper">
      <video id="player" class="player" playsinline crossorigin poster="https://i.ibb.co/6cgJGJ3p/x.jpg">
        <source src="{{file_url}}">
      </video>
    </div>
  </div>

  <!-- File info & engagement -->
  <div class="glass-card">
    <div class="file-info-title">
      <i class="fas fa-film"></i>
      <span>File Information</span>
    </div>
    <div class="info-item">
      <span class="info-label">📂Fɪʟᴇ-Nᴀᴍᴇ:</span>
      <span class="info-value file-name-truncate" id="displayFileName">{{file_name}}</span>
    </div>
    <div class="info-item">
      <span class="info-label">📦Fɪʟᴇ-Sɪᴢᴇ:</span>
      <span class="info-value" id="file-size-display">{{file_size}}</span>
    </div>

    <!-- Engagement stats row -->
    <div class="engagement-stats">
      <div class="d-flex">
        <button class="btn-like" id="likeBtn" onclick="likeVideo()">
          <i class="fas fa-thumbs-up"></i>
          <span id="likeCount"></span>
        </button>
        <button class="btn-dislike" id="dislikeBtn" onclick="dislikeVideo()">
          <i class="fas fa-thumbs-down"></i>
          <span id="dislikeCount"></span>
        </button>
        <div class="view-badge">
          <i class="fas fa-eye"></i>
          <span id="viewCount"></span> views
        </div>
        <a href="https://t.me/Cinemaniacs_Hub" target="_blank" class="btn-subscribe" id="telegramSubscribe">
          <i class="fab fa-telegram-plane"></i> Subscribe
        </a>
      </div>
    </div>

    <!-- external players -->
    <div class="players-row">
      <div class="btn-custom btn-mx" onclick="mx_player()">
        <i class="fas fa-play"></i> MX PLAYER
      </div>
      <div class="btn-custom btn-vlc" onclick="vlc_player()">
        <i class="fas fa-play-circle"></i> VLC PLAYER
      </div>
      <div class="btn-custom btn-playit" onclick="playit_player()">
        <i class="fas fa-bolt"></i> PLAY IT
      </div>
    </div>

    <div class="compat-box">
      <i class="fas fa-exclamation-triangle"></i> Video Not Playing? Possibly because your browser or player doesn't support the codec. Please watch using external players
    </div>
  </div>
  <script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
  <script>
    const BIN_ID = "69ece842856a682189706426";
    const API_KEY = "$2a$10$TyOXeu0PPOnyzTfOreJzhOKiw3NyMQtnURo0koS2JFiOFMatKoDgq";
    const videoId = "{{file_name}}"; // unique per video
    const playerConfig = {
      controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'download', 'fullscreen'],
      invertTime: false,
      autoplay: false,
      speed: {
        selected: 1,
        options: [0.5, 0.75, 1, 1.25, 1.5, 2]
      },
    };
    const player = new Plyr('#player', playerConfig);
    const video = document.getElementById('player');
    async function detectFileSize() {
      const fileSizeSpan = document.getElementById('file-size-display');
      const videoUrl = getRawLink();
      try {
        const response = await fetch(videoUrl, {
          method: 'HEAD'
        });
        const contentLength = response.headers.get('content-length');
        if (contentLength) {
          const bytes = parseInt(contentLength);
          const sizes = ['Bytes', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(1024));
          const formattedSize = parseFloat((bytes / Math.pow(1024, i)).toFixed(2)) + ' ' + sizes[i];
          fileSizeSpan.textContent = formattedSize;
        } else {
          fileSizeSpan.innerHTML = 'Unknown (Streaming)';
        }
      } catch (error) {
        fileSizeSpan.innerHTML = 'Not available';
      }
    }
    setTimeout(detectFileSize, 1000);

    function random(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    async function getData() {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: {
          "X-Master-Key": API_KEY
        }
      });
      const json = await res.json();
      return json.record || {};
    }
    async function updateData(data) {
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY
        },
        body: JSON.stringify(data)
      });
    }
    let videoData = {};
    async function initVideo() {
      let data = await getData();
      if (!data[videoId]) {
        data[videoId] = {
          likes: random(500, 1000),
          dislikes: random(10, 50),
          views: random(500, 1500)
        };
        await updateData(data);
      }
      videoData = data[videoId];
      document.getElementById("likeCount").innerText = videoData.likes;
      document.getElementById("dislikeCount").innerText = videoData.dislikes;
      document.getElementById("viewCount").innerText = videoData.views;
    }
    initVideo();
    async function likeVideo() {
      let action = localStorage.getItem(videoId + "_reaction");
      if (action === "like") return;
      videoData.likes++;
      if (action === "dislike") {
        videoData.dislikes--;
      }
      localStorage.setItem(videoId + "_reaction", "like");
      updateUI();
      save();
    }
    async function dislikeVideo() {
      let action = localStorage.getItem(videoId + "_reaction");
      if (action === "dislike") return;
      videoData.dislikes++;
      if (action === "like") {
        videoData.likes--;
      }
      localStorage.setItem(videoId + "_reaction", "dislike");
      updateUI();
      save();
    }
    player.on('play', async () => {
      wrapper.classList.add('active');
      let viewed = localStorage.getItem(videoId + "_viewed");
      if (!viewed) {
        videoData.views++;
        localStorage.setItem(videoId + "_viewed", "true");
        updateUI();
        save();
      }
    });

    function updateUI() {
      document.getElementById("likeCount").innerText = videoData.likes;
      document.getElementById("dislikeCount").innerText = videoData.dislikes;
      document.getElementById("viewCount").innerText = videoData.views;
    }
    async function save() {
      let data = await getData();
      data[videoId] = videoData;
      await updateData(data);
    }

    function getRawLink() {
      let currentUrl = window.location.href;
      let rawLink = currentUrl.replace("/watch/", "/");
      const templateUrl = "{{file_url}}";
      if (templateUrl && templateUrl !== "{{file_url}}") return templateUrl;
      return rawLink;
    }
    const videoLink = getRawLink();

    function vlc_player() {
      window.location.href = `vlc://${videoLink}`;
    }

    function mx_player() {
      window.location.href = `intent:${videoLink}#Intent;package=com.mxtech.videoplayer.ad;end`;
    }

    function playit_player() {
      window.location.href = `playit://playerv2/video?url=${encodeURIComponent(videoLink)}`;
    }
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
    player.on('enterfullscreen', () => {
      screen.orientation?.lock('landscape');
    });
    const fileNameSpan = document.getElementById('displayFileName');
    if (fileNameSpan && fileNameSpan.innerText.length > 65) {
      fileNameSpan.innerText = fileNameSpan.innerText.slice(0, 62) + '...';
    }
    const wrapper = document.querySelector('.video-wrapper');
    const plyrContainer = document.querySelector('.plyr');
    plyrContainer.addEventListener('click', (e) => {
      e.stopPropagation();
      wrapper.classList.add('active');
    });
    document.addEventListener('click', (e) => {
      if (!wrapper.contains(e.target)) {
        wrapper.classList.remove('active');
      }
    });
    player.on('play', () => {
      wrapper.classList.add('active');
    });
    player.on('pause', () => {
      wrapper.classList.remove('active');
    });
  </script>
</body>

</html>
